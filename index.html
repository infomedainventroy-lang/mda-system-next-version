<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d1b2a">
<title id="page-title">מערכת מלאי מד"א</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<style>
:root {
  --c-navy: #0d1b2a;
  --c-red: #d32f2f;
  --bg: #f4f6f9;
  --surface: #ffffff;
  --text: #1a202c;
  --border: #e1e6ed;
  --r-sm: 10px;
  --sh-md: 0 4px 16px rgba(0,0,0,.10);
}

[data-theme="dark"] {
  --bg: #0d1117;
  --surface: #161b22;
  --text: #e6edf3;
  --border: #30363d;
}

body { font-family: 'Heebo', sans-serif; background: var(--bg); color: var(--text); direction: rtl; }
.card { background: var(--surface); padding: 20px; border-radius: var(--r-sm); border: 1px solid var(--border); margin-bottom: 15px; }
.app-input { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 5px; margin-bottom: 10px; background: var(--surface); color: var(--text); }
.btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
.btn-blue { background: #1a6eb5; color: white; }
.hidden { display: none; }
</style>
</head>
<body>

<div id="app">
  <div class="card">
    <h3>📦 הוספת מוצר חדש עם תוקף</h3>
    <input type="text" id="n-name" class="app-input" placeholder="שם מוצר">
    <input type="text" id="n-cat" class="app-input" placeholder="קטגוריה">
    <input type="number" id="n-qty" class="app-input" placeholder="כמות">
    <label>תאריך תוקף:</label>
    <input type="date" id="n-expiry" class="app-input">
    <button class="btn btn-blue" onclick="addItem()">➕ הוסף למלאי</button>
  </div>

  <div class="card">
    <h3>👨‍💼 ניהול מוצרים פגי תוקף</h3>
    <div id="expiry-list"></div>
  </div>
</div>

<script>
const CONFIGS = {
  main: {
    firebase: {
      apiKey: "AIzaSyD9ApZOKj7aRUmcAG8MVncsCitOOJBH-cs",
      authDomain: "meda-inventory-karnei-shomron.firebaseapp.com",
      databaseURL: "https://meda-inventory-karnei-shomron-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "mda-inventory"
    }
  },
  test: {
    firebase: {
      apiKey: "AIzaSyD9JAMl1_bjL-DeX_ql3e8UR",
      authDomain: "mda-test.firebaseapp.com",
      databaseURL: "https://mda-test-default-rtdb.firebaseio.com",
      projectId: "mda-test"
    }
  }
};

const DISCORD_SETTINGS = {
  webhookUrl: "YOUR_DISCORD_WEBHOOK_URL",
  mentionRole: "1483800391660339303",
  alertExpiry: true
};

firebase.initializeApp(CONFIGS.main.firebase);
const db = firebase.database();

async function addItem() {
  const name = document.getElementById('n-name').value;
  const qty = parseInt(document.getElementById('n-qty').value);
  const expiry = document.getElementById('n-expiry').value;
  
  if(!name || !expiry) return alert("נא למלא שם ותאריך תוקף");

  const newItem = {
    name,
    qty,
    category: document.getElementById('n-cat').value,
    expiryDate: expiry,
    timestamp: Date.now()
  };

  await db.ref('inventory').push(newItem);
  checkExpirations();
}

function checkExpirations() {
  db.ref('inventory').once('value', snap => {
    const now = new Date();
    const thirtyDaysFromNow = new Date();
    thirtyDaysFromNow.setDate(now.getDate() + 30);

    snap.forEach(child => {
      const item = child.val();
      if (item.expiryDate) {
        const expDate = new Date(item.expiryDate);
        if (expDate <= now) {
          sendDiscordExpiryAlert(item, "🚨 פג תוקף!");
        } else if (expDate <= thirtyDaysFromNow) {
          sendDiscordExpiryAlert(item, "⚠️ תוקף עומד לפוג בקרוב");
        }
      }
    });
  });
}

async function sendDiscordExpiryAlert(item, status) {
  if (!DISCORD_SETTINGS.webhookUrl) return;

  const embed = {
    title: status,
    color: status.includes("🚨") ? 0xD32F2F : 0xF57F17,
    fields: [
      { name: "מוצר", value: item.name, inline: true },
      { name: "תאריך תוקף", value: item.expiryDate, inline: true },
      { name: "כמות במלאי", value: item.qty.toString(), inline: true }
    ],
    footer: { text: "מערכת ניהול מלאי מד"א" },
    timestamp: new Date().toISOString()
  };

  await fetch(DISCORD_SETTINGS.webhookUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      content: `<@&${DISCORD_SETTINGS.mentionRole}> התראת תוקף מוצר:`,
      embeds: [embed]
    })
  });
}

setInterval(checkExpirations, 86400000); 

</script>
</body>
</html>
